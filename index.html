<!DOCTYPE html>
<html>
<head>
  <title>My Accountability Tracker</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    td, th {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>

<h3> Key words: why, play, necessity, optimum, habit
  
<h1>📊 My Daily Accountability</h1>

<table id="tracker">
  <thead>
    <tr>
      <th>Date</th>
      <th>Work (pomos)</th>
      <th>Meditation</th>
      <th>Journal</th>
      <th>Sleep on Time</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const table = document.querySelector("#tracker tbody");

    data.forEach(day => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${day.date}</td>
        <td>${day.work}</td>
        <td>${day.meditation ? "✅" : "❌"}</td>
        <td>${day.journal ? "✅" : "❌"}</td>
        <td>${day.sleep ? "✅" : "❌"}</td>
      `;

      table.appendChild(row);
    });
  });
</script>

</body>
</html>
